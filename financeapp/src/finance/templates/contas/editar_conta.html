{% extends "base.html" %}
{% block title %}Editar Conta{% endblock %}
{% block content %}
    <div class="card">
        <h1>Editar Conta</h1>
        
        <form action="{{ url_for('contas.editar_conta', id=conta.id) }}" method="POST">
            
            <div style="margin-bottom: 15px;">
                <label for="usuario_id">Usuário Dono da Conta:</label>
                <select id="usuario_id" name="usuario_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    {% for usuario in usuarios %}
                        <option value="{{ usuario.id }}" {% if usuario.id == conta.usuario_id %}selected{% endif %}>
                            {{ usuario.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="nome">Nome da Conta:</label>
                <input type="text" id="nome" name="nome" value="{{ conta.nome }}" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="saldo_inicial">Saldo Inicial (R$):</label>
                <input type="number" step="0.01" id="saldo_inicial" name="saldo_inicial" value="{{ conta.saldo_inicial }}" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn" style="background: #111827; color: white;">Salvar Alterações</button>
                <a href="{{ url_for('contas.listar_contas') }}" class="btn" style="background: #e5e7eb; color: #374151; border: 1px solid #d1d5db; text-decoration: none;">Cancelar</a>
            </div>
            
        </form>
    </div>
{% endblock %}
