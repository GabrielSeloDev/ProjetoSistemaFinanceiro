{% extends "base.html" %}
{% block title %}Nova Conta{% endblock %}
{% block content %}
    <div class="card">
        <h1>Nova Conta</h1>
        <p class="muted">Cadastre uma nova carteira ou conta bancária.</p>
        
        <form action="{{ url_for('contas.salvar_conta') }}" method="POST">
            
            <div style="margin-bottom: 15px;">
                <label for="usuario_id">Usuário Dono da Conta:</label>
                <select id="usuario_id" name="usuario_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    <option value="">-- Selecione o usuário --</option>
                    {% for usuario in usuarios %}
                        <option value="{{ usuario.id }}">{{ usuario.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="nome">Nome da Conta:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Nubank, Carteira, Itaú..." style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="saldo_inicial">Saldo Inicial (R$):</label>
                <input type="number" step="0.01" id="saldo_inicial" name="saldo_inicial" value="0.00" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn" style="background: #111827; color: white;">Salvar Conta</button>
                <a href="{{ url_for('contas.listar_contas') }}" class="btn" style="background: #e5e7eb; color: #374151; border: 1px solid #d1d5db; text-decoration: none;">Cancelar</a>
            </div>
            
        </form>
    </div>
{% endblock %}
