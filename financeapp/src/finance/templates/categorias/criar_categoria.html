{% extends "base.html" %}

{% block title %}Nova Categoria{% endblock %}

{% block content %}
    <div class="card">
        <h1>Criar Categoria</h1>
        
        <form action="{{ url_for('categoria.salvar_categoria') }}" method="POST">
            
            <div style="margin-bottom: 15px;">
                <label for="usuario_id">ID do Usuário (Dono da Categoria):</label>
                <input type="number" id="usuario_id" name="usuario_id" required>
            </div>
            <div style="margin-bottom: 15px;">
                <label for="nome">Nome da categoria:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="cor">Cor:</label>
                <input type="color" id="cor" name="cor" value="#ff0000" required>
            </div>

            <button type="submit">Salvar Categoria</button>
            
        </form>
    </div>
{% endblock %}
