{% extends "base.html" %}

{% block title %}Novo Lançamento{% endblock %}

{% block content %}
    <div class="card">
        <h1>Novo Lançamento</h1>
        <p class="muted">Registre uma nova entrada ou saída de dinheiro.</p>
        
        {% if erro %}
            <div style="background-color: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #f87171;">
                ⚠️ {{ erro }}
            </div>
        {% endif %}

        <form action="{{ url_for('lancamentos.salvar_lancamento') }}" method="POST">
            
            <div style="margin-bottom: 15px;">
                <label for="usuario_id">Usuário (Dono):</label>
                <select id="usuario_id" name="usuario_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    <option value="">-- Selecione o usuário --</option>
                    {% for usuario in usuarios %}
                        <option value="{{ usuario.id }}">{{ usuario.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="margin-bottom: 15px;">
                <label for="nome">Nome do Lançamento:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Salário, Conta de Luz..." style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="valor">Valor (R$):</label>
                <input type="number" step="0.01" min="0" id="valor" name="valor" placeholder="0.00" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="tipo">Tipo do Lançamento:</label>
                <select id="tipo" name="tipo" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    <option value="">-- Selecione --</option>
                    <option value="entrada">🟢 Entrada (Receita)</option>
                    <option value="saida">🔴 Saída (Despesa)</option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="conta_id">Conta Bancária:</label>
                <select id="conta_id" name="conta_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    <option value="">-- Escolha uma conta --</option>
                    {% for conta in contas %}
                        <option value="{{ conta.id }}">{{ conta.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="categoria_id">Categoria:</label>
                <select id="categoria_id" name="categoria_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    <option value="">-- Escolha uma categoria --</option>
                    {% for categoria in categorias %}
                        <option value="{{ categoria.id }}">{{ categoria.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="btn" style="background: #111827; color: white; cursor: pointer; padding: 10px 15px; border: none; border-radius: 5px;">
                Salvar Lançamento
            </button>
            
        </form>
    </div>
{% endblock %}
