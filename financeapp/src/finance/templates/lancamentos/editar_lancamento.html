{% extends "base.html" %}
{% block title %}Editar Lançamento{% endblock %}
{% block content %}
    <div class="card">
        <h1>Editar Lançamento</h1>
        
        {% if erro %}
            <div style="background-color: #fee2e2; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #f87171;">
                ⚠️ {{ erro }}
            </div>
        {% endif %}

        <form action="{{ url_for('lancamentos.editar_lancamento', id=lancamento.id) }}" method="POST">
            
            <div style="margin-bottom: 15px;">
                <label for="usuario_id">Usuário (Dono):</label>
                <select id="usuario_id" name="usuario_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    {% for usuario in usuarios %}
                        <option value="{{ usuario.id }}" {% if usuario.id == lancamento.usuario_id %}selected{% endif %}>
                            {{ usuario.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="nome">Nome do Lançamento:</label>
                <input type="text" id="nome" name="nome" value="{{ lancamento.nome }}" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="valor">Valor (R$):</label>
                <input type="number" step="0.01" min="0" id="valor" name="valor" value="{{ lancamento.valor }}" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="tipo">Tipo do Lançamento:</label>
                <select id="tipo" name="tipo" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    <option value="entrada" {% if lancamento.tipo == 'entrada' %}selected{% endif %}>🟢 Entrada (Receita)</option>
                    <option value="saida" {% if lancamento.tipo == 'saida' %}selected{% endif %}>🔴 Saída (Despesa)</option>
                </select>
            </div>

            <div style="margin-bottom: 15px;">
                <label for="conta_id">Conta Bancária:</label>
                <select id="conta_id" name="conta_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    {% for conta in contas %}
                        <option value="{{ conta.id }}" {% if conta.id == lancamento.conta_id %}selected{% endif %}>
                            {{ conta.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 25px;">
                <label for="categoria_id">Categoria:</label>
                <select id="categoria_id" name="categoria_id" style="width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px;" required>
                    {% for categoria in categorias %}
                        <option value="{{ categoria.id }}" {% if categoria.id == lancamento.categoria_id %}selected{% endif %}>
                            {{ categoria.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div style="display: flex; gap: 10px;">
                <button type="submit" class="btn" style="background: #111827; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer;">Salvar</button>
                <a href="{{ url_for('lancamentos.listar_lancamentos') }}" class="btn" style="background: #e5e7eb; color: #374151; border: 1px solid #d1d5db; text-decoration: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">Cancelar</a>
            </div>
            
        </form>
    </div>
{% endblock %}
