{% extends "base.html" %}
{% block title %}Usuários{% endblock %}

{% block content %}
  <h1>Usuários</h1>

  <table class="table">
    <thead>
      <tr>
        <th>ID</th><th>Nome</th><th>Email</th>
      </tr>
    </thead>
    <tbody>
      {% for u in usuarios %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.nome }}</td>
        <td>{{ u.email }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
